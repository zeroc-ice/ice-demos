name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ["main"]

# See https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  ci:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: macos-26
          - os: windows-2022

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 8.x

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "oracle"
          java-version: "17"

      - name: Install Nightly Ice Builds
        uses: ./.github/actions/install-nightly-ice

      - name: Build C++ Demos
        timeout-minutes: 20
        working-directory: cpp
        run: |
          set -o pipefail

          find . -name CMakeLists.txt -type f | while IFS= read -r file; do
            dir=$(dirname "$file");
            cmake -B "$dir/build" -S "$dir" -G Ninja -DCMAKE_COMPILE_WARNING_AS_ERROR=ON
            cmake --build "$dir/build" --verbose
          done
        if: runner.os != 'Windows'

      - name: Build C++ Demos
        timeout-minutes: 20
        working-directory: cpp
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Find Visual Studio installation using vswhere
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $vcvarsall = "$vsPath\VC\Auxiliary\Build\vcvarsall.bat"

          # Load MSVC environment
          cmd /c "`"$vcvarsall`" x64 && set" | ForEach-Object {
              if ($_ -match '^([^=]+)=(.*)$') {
                  [Environment]::SetEnvironmentVariable($matches[1], $matches[2], "Process")
              }
          }

          Get-ChildItem -Recurse -Filter CMakeLists.txt | ForEach-Object {
              Write-Output "Processing: $_"
              $dir = $_.DirectoryName

              cmake -B "$dir/build" -S "$dir" -G Ninja -DCMAKE_COMPILE_WARNING_AS_ERROR=ON -DICE_COPY_PDB=ON
              if ($LASTEXITCODE -ne 0) { throw "CMake configuration failed" }

              # Run cmake build step
              cmake --build "$dir/build" --verbose
              if ($LASTEXITCODE -ne 0) { throw "CMake build failed" }
          }
        if: runner.os == 'Windows'

      - name: Build C# Demos
        timeout-minutes: 20
        working-directory: csharp
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Recurse -Filter *.slnx | ForEach-Object {
            Write-Host "Building solution: $($_.FullName)"
            dotnet build /p:TreatWarningsAsErrors=true $_.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "dotnet build failed for $($_.FullName)"
            }
          }

      - name: Build Java Demos
        timeout-minutes: 20
        working-directory: java
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Recurse -Depth 2 -Filter gradlew | ForEach-Object {
            # Skip Android demos (built separately)
            if ($_.DirectoryName -match "android") {
              Write-Host "Skipping Android demo: $($_.DirectoryName)"
              return
            }
            Push-Location $_.DirectoryName
            Write-Host "Building in $($_.DirectoryName)..."
            & ./gradlew build
            if ($LASTEXITCODE -ne 0) {
              throw "Build failed in $($_.DirectoryName)"
            }
            Pop-Location
          }

      - name: Build JavaScript Demos
        timeout-minutes: 20
        working-directory: js
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Recurse -Depth 2 -Filter package.json | ForEach-Object {
            Push-Location $_.DirectoryName
            Write-Host "Installing and building in $($_.DirectoryName)..."

            npm install
            if ($LASTEXITCODE -ne 0) { throw "npm install failed in $($_.DirectoryName)" }

            npm run build
            if ($LASTEXITCODE -ne 0) { throw "npm build failed in $($_.DirectoryName)" }

            npx eslint .
            if ($LASTEXITCODE -ne 0) { throw "ESLint failed in $($_.DirectoryName)" }

            Pop-Location
          }

      - name: Build Swift Demos
        timeout-minutes: 60
        working-directory: swift
        run: |
          set -o pipefail
          find . -name Package.swift -type f | while IFS= read -r file; do
              swift build --package-path "$(dirname "$file")"
          done
        if: runner.os == 'macOS'

  ci-containers:
    name: ${{ matrix.distro }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu24.04, ubuntu26.04, debian12, debian13, rocky9, rocky10, amzn2023]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Build Docker image
        run: |
          docker build -f .github/docker/${{ matrix.distro }}/Dockerfile \
            -t ice-demos-${{ matrix.distro }}:test .github/docker/${{ matrix.distro }}

      - name: Build C++ Demos
        timeout-minutes: 20
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/ice-demos \
            -w /ice-demos/cpp \
            ice-demos-${{ matrix.distro }}:test \
            bash -c '
              set -o pipefail
              find . -name CMakeLists.txt -type f | while IFS= read -r file; do
                dir=$(dirname "$file");
                cmake -B "$dir/build" -S "$dir" -G Ninja -DCMAKE_COMPILE_WARNING_AS_ERROR=ON
                cmake --build "$dir/build" --verbose
              done
            '

  ci-android:
    name: Android
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "oracle"
          java-version: "17"

      - name: Install Nightly Ice Builds
        uses: ./.github/actions/install-nightly-ice

      - name: Build Android Demos
        timeout-minutes: 20
        working-directory: java
        run: |
          set -o pipefail
          find . -path "*/android*" -name gradlew -type f | while IFS= read -r file; do
            dir=$(dirname "$file")
            echo "Building Android demo in $dir..."
            cd "$dir"
            ./gradlew build
            cd - > /dev/null
          done
