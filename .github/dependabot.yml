version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directories:
      - "/js/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    groups:
      js-minor-and-patch:
        update-types: ["minor", "patch"]
      js-major:
        update-types: ["major"]

  - package-ecosystem: "pip"
    directories:
      - "/python/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    groups:
      python-minor-and-patch:
        update-types: ["minor", "patch"]
      python-major:
        update-types: ["major"]

  - package-ecosystem: "gradle"
    directories:
      - "/java/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    groups:
      java-minor-and-patch:
        update-types: ["minor", "patch"]
      java-major:
        update-types: ["major"]

  - package-ecosystem: "nuget"
    directories:
      - "/csharp/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    groups:
      dotnet-minor-and-patch:
        update-types: ["minor", "patch"]
      dotnet-major:
        update-types: ["major"]

  - package-ecosystem: "swift"
    directories:
      - "/swift/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    groups:
      swift-minor-and-patch:
        update-types: ["minor", "patch"]
      swift-major:
        update-types: ["major"]
